aid: otter-ai
name: Otter.ai
description: >-
  Otter.ai is an AI-powered meeting transcription and conversational intelligence
  platform that automatically records, transcribes, and summarizes meetings across
  Zoom, Google Meet, Microsoft Teams, and other video conferencing services. The
  platform provides a REST API for Enterprise customers to programmatically retrieve
  speech-to-text transcripts, speaker-identified conversation segments, and
  AI-generated meeting summaries. Developers can upload audio files, retrieve
  processed transcripts via webhooks, and integrate meeting intelligence into their
  own applications using bearer token authentication. Otter.ai also offers an MCP
  Server integration enabling AI assistants like Claude and ChatGPT to query meeting
  knowledge directly.
