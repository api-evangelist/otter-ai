    name: Otter.ai API
    description: >-
      The Otter.ai REST API enables Enterprise customers to programmatically upload
      audio and video files for transcription, retrieve speaker-identified transcripts,
      receive webhook notifications when speech processing completes, and integrate
      meeting intelligence into custom applications. The API uses bearer token
      authentication and supports Python, Node.js, and Java client libraries.
